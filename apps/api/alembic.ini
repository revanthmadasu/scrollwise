# Alembic config for the API-owned tables ONLY. The content-generator owns
# `posts`/`curricula`; migrations here must never touch them (see migrations/env.py).
[alembic]
script_location = migrations
prepend_sys_path = .
# The actual URL is read from the app settings (DATABASE_URL) in env.py.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
