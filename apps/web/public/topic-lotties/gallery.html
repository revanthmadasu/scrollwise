<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ScrollWise — topic Lottie gallery</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; padding: 24px; background: #07070c; color: #e7e7ef;
           font: 14px/1.5 system-ui, sans-serif; }
    h1 { font-weight: 500; font-size: 20px; margin: 0 0 4px; }
    .sub { color: #9a9ab0; margin: 0 0 20px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    button { background: #15151f; color: #cfcfe0; border: 1px solid #2a2a3a;
             border-radius: 8px; padding: 6px 12px; cursor: pointer; font: inherit; }
    button.on { background: #2a2a3a; color: #fff; }
    h2 { font-weight: 500; font-size: 15px; margin: 24px 0 10px; text-transform: capitalize; }
    .mood { color: #8a8aa0; font-weight: 400; font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .cell { background: #0e0e16; border: 1px solid #1c1c28; border-radius: 10px; overflow: hidden; }
    .anim { width: 100%; height: 130px; background: #000; }
    .cap { padding: 6px 8px; font-size: 11px; color: #8a8aa0;
           display: flex; justify-content: space-between; gap: 6px; }
    .cap b { color: #cfcfe0; font-weight: 500; }
  </style>
</head>
<body>
  <h1>ScrollWise — topic Lottie gallery</h1>
  <p class="sub">180 looping animations · 6 topics × (small / medium / large) × 10 · 3s @ 30fps. Metadata in <code>manifest.json</code>.</p>
  <div class="controls" id="filters"></div>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script>
    const SIZES = ["small", "medium", "large"];
    let activeSize = "all";
    let manifest = null;
    fetch("manifest.json").then(r => r.json()).then(m => {
      manifest = m;
      const filters = document.getElementById("filters");
      ["all", ...SIZES].forEach(s => {
        const b = document.createElement("button");
        b.textContent = s;
        b.className = s === activeSize ? "on" : "";
        b.onclick = () => { activeSize = s;
          [...filters.children].forEach(c => c.className = c.textContent === s ? "on" : "");
          render(); };
        filters.appendChild(b);
      });
      render();
    });
    function render() {
      const root = document.getElementById("root");
      root.innerHTML = "";
      manifest.topics.forEach(topic => {
        const assets = manifest.assets.filter(a => a.topic === topic &&
          (activeSize === "all" || a.size === activeSize));
        if (!assets.length) return;
        const h = document.createElement("h2");
        h.innerHTML = topic + ' <span class="mood">' + assets[0].mood + '</span>';
        root.appendChild(h);
        const grid = document.createElement("div");
        grid.className = "grid";
        assets.forEach(a => {
          const cell = document.createElement("div");
          cell.className = "cell";
          const anim = document.createElement("div");
          anim.className = "anim";
          const cap = document.createElement("div");
          cap.className = "cap";
          cap.innerHTML = '<b>' + a.size + '</b><span>' + a.elements.join(" · ") + '</span>';
          cell.appendChild(anim);
          cell.appendChild(cap);
          grid.appendChild(cell);
          lottie.loadAnimation({ container: anim, renderer: "svg", loop: true,
            autoplay: true, path: a.file });
        });
        root.appendChild(grid);
      });
    }
  </script>
</body>
</html>
